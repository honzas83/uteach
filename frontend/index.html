<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTEACH.AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Decoration -->
    <div class="bg-decor" aria-hidden="true">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a class="logo" href="#">
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                        <path d="M12 2C6.477 2 2 6.477 2 12c0 3.59 1.89 6.74 4.72 8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
                    </svg>
                </div>
                <span class="logo-text">UTEACH<span class="logo-accent">.</span>AI</span>
            </a>
            <button class="theme-btn" id="themeToggle" aria-label="Prepnout motiv">
                <div class="theme-track">
                    <div class="theme-thumb"></div>
                    <svg class="theme-icon theme-icon--light" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
                        <circle cx="7" cy="7" r="3"/>
                        <line x1="7" y1="1" x2="7" y2="2.2"/><line x1="7" y1="11.8" x2="7" y2="13"/>
                        <line x1="2.76" y1="2.76" x2="3.61" y2="3.61"/><line x1="10.39" y1="10.39" x2="11.24" y2="11.24"/>
                        <line x1="1" y1="7" x2="2.2" y2="7"/><line x1="11.8" y1="7" x2="13" y2="7"/>
                        <line x1="2.76" y1="11.24" x2="3.61" y2="10.39"/><line x1="10.39" y1="3.61" x2="11.24" y2="2.76"/>
                    </svg>
                    <svg class="theme-icon theme-icon--dark" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
                        <path d="M12.1 7.7A5.5 5.5 0 1 1 6.3 1.9a4 4 0 0 0 5.8 5.8z"/>
                    </svg>
                </div>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="main">

        <!-- Stepper -->
        <nav class="stepper" aria-label="Kroky zpracovani">
            <div class="stepper-rail">
                <div class="stepper-fill" id="stepperFill"></div>
            </div>
            <div class="stepper-nodes">
                <button class="stepper-node active" data-step="1">
                    <div class="stepper-circle">
                        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 1.5a2 2 0 0 0-2 2v5a2 2 0 0 0 4 0v-5a2 2 0 0 0-2-2z"/>
                            <path d="M14 7.5v1a5 5 0 0 1-10 0v-1"/>
                            <line x1="9" y1="13.5" x2="9" y2="16.5"/>
                        </svg>
                    </div>
                    <span class="stepper-label">Nahrani</span>
                </button>
                <button class="stepper-node" data-step="2">
                    <div class="stepper-circle">
                        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16.5 9 14 9 11.5 15.5 6.5 2.5 4 9 1.5 9"/>
                        </svg>
                    </div>
                    <span class="stepper-label">Zpracovani</span>
                </button>
                <button class="stepper-node" data-step="3">
                    <div class="stepper-circle">
                        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.5 1.5H4.5a1.5 1.5 0 0 0-1.5 1.5v12a1.5 1.5 0 0 0 1.5 1.5h9a1.5 1.5 0 0 0 1.5-1.5V6z"/>
                            <polyline points="10.5 1.5 10.5 6 15 6"/>
                        </svg>
                    </div>
                    <span class="stepper-label">Vysledek</span>
                </button>
            </div>
        </nav>

        <!-- =================== STEP 1 =================== -->
        <section class="section active" id="step1">
            <div class="tab-bar">
                <button class="tab active" data-tab="upload">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15.5 11v3a1.5 1.5 0 0 1-1.5 1.5H4A1.5 1.5 0 0 1 2.5 14v-3"/>
                        <polyline points="12.5 5.5 9 2 5.5 5.5"/>
                        <line x1="9" y1="2" x2="9" y2="12"/>
                    </svg>
                    Nahrat soubor
                </button>
                <button class="tab" data-tab="record">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 1.5a2 2 0 0 0-2 2v5a2 2 0 0 0 4 0v-5a2 2 0 0 0-2-2z"/>
                        <path d="M14 7.5v1a5 5 0 0 1-10 0v-1"/>
                        <line x1="9" y1="13.5" x2="9" y2="16.5"/>
                    </svg>
                    Nahravat zvuk
                </button>
            </div>

            <!-- Upload Panel -->
            <div class="panel active" id="panelUpload">
                <div class="dropzone" id="dropzone">
                    <div class="dropzone-glow"></div>
                    <div class="dropzone-icon-wrap">
                        <svg viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 34V14"/>
                            <polyline points="14 22 22 14 30 22"/>
                            <path d="M38 30v4a4 4 0 0 1-4 4H10a4 4 0 0 1-4-4v-4"/>
                        </svg>
                    </div>
                    <p class="dropzone-title">Pretahnete zvukovy soubor sem</p>
                    <div class="dropzone-sep"><span>nebo</span></div>
                    <button class="btn btn-outline btn-sm" id="browseBtn" type="button">Vybrat soubor</button>
                    <p class="dropzone-caps">MP3, WAV, OGG, FLAC, M4A, WEBM</p>
                    <input type="file" id="fileInput" accept="audio/*" hidden>
                </div>

                <div class="file-card hidden" id="filePreview">
                    <div class="file-row">
                        <div class="file-icon-box">
                            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M7.5 15V4l10-1.5v11"/>
                                <circle cx="5" cy="15" r="2.5"/>
                                <circle cx="15" cy="13.5" r="2.5"/>
                            </svg>
                        </div>
                        <div class="file-info">
                            <span class="file-name" id="fileName"></span>
                            <span class="file-size" id="fileSize"></span>
                        </div>
                        <button class="btn-x" id="removeFile" aria-label="Odstranit">
                            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="11" y1="3" x2="3" y2="11"/><line x1="3" y1="3" x2="11" y2="11"/></svg>
                        </button>
                    </div>
                    <audio id="audioPlayer" controls class="audio-el"></audio>
                </div>
            </div>

            <!-- Record Panel -->
            <div class="panel" id="panelRecord">
                <div class="mic-bar">
                    <label for="micSelect">
                        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4.5" width="10" height="7.5" rx="1.5"/>
                            <polyline points="9.5 2 7 4.5 4.5 2"/>
                        </svg>
                        Zdroj zvuku
                    </label>
                    <select id="micSelect"><option value="">Nacitani zarizeni...</option></select>
                </div>

                <div class="rec-card">
                    <div class="rec-wave" id="waveform"><canvas id="waveCanvas"></canvas></div>
                    <div class="rec-time" id="recorderTime">00:00</div>
                    <div class="rec-actions">
                        <button class="rec-btn" id="recordBtn" aria-label="Nahravat"><span class="rec-dot"></span></button>
                        <span class="rec-hint" id="recorderHint">Stisknete pro nahravani</span>
                    </div>
                </div>

                <div class="rec-preview hidden" id="recordingPreview">
                    <audio id="recordedAudio" controls class="audio-el"></audio>
                    <button class="btn btn-ghost btn-sm" id="discardRecording">
                        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 4 3 4 12 4"/><path d="M11 4v8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4m2 0V3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1"/></svg>
                        Zahodit
                    </button>
                </div>
            </div>

            <div class="lang-bar">
                <label for="langSelect">
                    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="7" cy="7" r="5.5"/>
                        <path d="M1.5 7h11"/><path d="M7 1.5c-1.7 2-2.5 3.5-2.5 5.5s.8 3.5 2.5 5.5c1.7-2 2.5-3.5 2.5-5.5S8.7 3.5 7 1.5z"/>
                    </svg>
                    Jazyk
                </label>
                <select id="langSelect">
                    <option value="cs">Čeština</option>
                    <option value="sk">Slovenčina</option>
                    <option value="en">English</option>
                    <option value="de">Deutsch</option>
                    <option value="pl">Polski</option>
                    <option value="hu">Magyar</option>
                    <option value="hr">Hrvatski</option>
                    <option value="sr">Srpski</option>
                    <option value="nl">Nederlands</option>
                </select>
            </div>

            <button class="btn btn-accent btn-lg btn-block disabled" id="submitBtn" disabled>
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 2L9 11"/><path d="M18 2l-5.5 16-3.5-7-7-3.5L18 2z"/>
                </svg>
                Zpracovat prednasku
            </button>
        </section>

        <!-- =================== STEP 2 =================== -->
        <section class="section" id="step2">
            <div class="proc-hero">
                <div class="proc-orbit">
                    <div class="proc-ring-outer"></div>
                    <div class="proc-ring-inner"></div>
                    <div class="proc-core">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                    </div>
                </div>
                <div class="proc-list">
                    <div class="proc-item active" id="stageTranscribe">
                        <div class="proc-item-dot"><div class="dot-pulse"></div></div>
                        <span>Prevod reci na text</span>
                        <div class="proc-item-check">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 4.5 6 11.5 3 8.5"/></svg>
                        </div>
                    </div>
                    <div class="proc-item" id="stageSummarize">
                        <div class="proc-item-dot"><div class="dot-pulse"></div></div>
                        <span>AI sumarizace</span>
                        <div class="proc-item-check">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 4.5 6 11.5 3 8.5"/></svg>
                        </div>
                    </div>
                    <div class="proc-item" id="stagePdf">
                        <div class="proc-item-dot"><div class="dot-pulse"></div></div>
                        <span>Generovani PDF</span>
                        <div class="proc-item-check">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 4.5 6 11.5 3 8.5"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- =================== STEP 3 =================== -->
        <section class="section" id="step3">
            <div class="results">
                <div class="res-card">
                    <div class="res-head">
                        <div class="res-icon res-icon--blue">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9.5 1.5H4a1.5 1.5 0 0 0-1.5 1.5v10A1.5 1.5 0 0 0 4 14.5h8A1.5 1.5 0 0 0 13.5 13V5.5z"/>
                                <polyline points="9.5 1.5 9.5 5.5 13.5 5.5"/>
                                <line x1="10.5" y1="8.5" x2="5.5" y2="8.5"/><line x1="10.5" y1="11" x2="5.5" y2="11"/>
                            </svg>
                        </div>
                        <span class="res-title">Transkript</span>
                        <button class="btn-copy" id="copyTranscript" aria-label="Kopirovat">
                            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="5" y="5" width="7.5" height="7.5" rx="1.2"/>
                                <path d="M3 9.5H2.5A1.2 1.2 0 0 1 1.3 8.3V2.5A1.2 1.2 0 0 1 2.5 1.3h5.8A1.2 1.2 0 0 1 9.5 2.5V3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="res-body" id="transcriptBody"></div>
                </div>
                <div class="res-card">
                    <div class="res-head">
                        <div class="res-icon res-icon--purple">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="8 1.5 9.8 5.5 14.2 6 10.8 9.2 11.7 13.6 8 11.7 4.3 13.6 5.2 9.2 1.8 6 6.2 5.5 8 1.5"/>
                            </svg>
                        </div>
                        <span class="res-title">Shrnuti</span>
                        <button class="btn-copy" id="copySummary" aria-label="Kopirovat">
                            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="5" y="5" width="7.5" height="7.5" rx="1.2"/>
                                <path d="M3 9.5H2.5A1.2 1.2 0 0 1 1.3 8.3V2.5A1.2 1.2 0 0 1 2.5 1.3h5.8A1.2 1.2 0 0 1 9.5 2.5V3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="res-body" id="summaryBody"></div>
                </div>
            </div>
            <div class="res-actions">
                <button class="btn btn-accent btn-lg" id="downloadPdf">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15.5 11v3a1.5 1.5 0 0 1-1.5 1.5H4A1.5 1.5 0 0 1 2.5 14v-3"/>
                        <polyline points="5.5 8 9 11.5 12.5 8"/>
                        <line x1="9" y1="11.5" x2="9" y2="2.5"/>
                    </svg>
                    Stahnout PDF
                </button>
                <button class="btn btn-glass" id="newSession">
                    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1.5 3 1.5 7.5 6 7.5"/>
                        <path d="M3.2 11.5a7 7 0 1 0 1.6-7.2L1.5 7.5"/>
                    </svg>
                    Nova prednaska
                </button>
            </div>+
        </section>
    </main>

    <!-- Toast -->
    <div class="toast hidden" id="toast">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 7.3V8a6 6 0 1 1-3.56-5.49"/>
            <polyline points="14 2.5 8 8.51 6 6.51"/>
        </svg>
        <span id="toastMessage"></span>
    </div>

    <script src="MediaRecorder-MediaBackUp.js"></script>
    <script src="app.js"></script>
</body>
</html>

# ╔══════════════════════════════════════════════════════════════════╗
# ║              UTEACH.AI — CI/CD PIPELINE                        ║
# ║  lint → test → build → security scan → deploy → smoke test    ║
# ╚══════════════════════════════════════════════════════════════════╝

name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/frontend]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: webapp-app
  ECS_CLUSTER: webapp-cluster
  ECS_SERVICE: webapp-service
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  # ━━━━━━━━━━━━━━━━ STAGE 1: LINT ━━━━━━━━━━━━━━━━
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt flake8

      - name: Python syntax check
        run: python -m py_compile backend/server.py

      - name: Flake8 lint
        run: flake8 backend/server.py --max-line-length=120 --count --show-source --statistics

      - name: Validate Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ━━━━━━━━━━━━━━━━ STAGE 2: TEST ━━━━━━━━━━━━━━━━
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short
        continue-on-error: false

  # ━━━━━━━━━━━━━━━━ STAGE 3: BUILD ━━━━━━━━━━━━━━━━
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: uteach-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container & health check
        run: |
          docker run -d --name test-app -p 5001:5001 uteach-app:${{ github.sha }}
          echo "Waiting for app to start..."
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:5001/health; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "❌ Health check failed"
          docker logs test-app
          exit 1

      - name: Verify static assets served
        run: |
          curl -sf http://localhost:5001/ | grep -q "<html" && echo "✅ index.html OK"
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:5001/styles.css | grep -q "200" && echo "✅ styles.css OK"
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:5001/app.js | grep -q "200" && echo "✅ app.js OK"

      - name: Stop test container
        if: always()
        run: docker rm -f test-app 2>/dev/null || true

  # ━━━━━━━━━━━━━━━━ STAGE 4: SECURITY SCAN ━━━━━━━━━━━━━━━━
  security:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install safety
        run: pip install safety pip-audit

      - name: Check dependencies for vulnerabilities
        run: pip-audit -r backend/requirements.txt
        continue-on-error: true

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH

  # ━━━━━━━━━━━━━━━━ STAGE 5: DEPLOY TO AWS ━━━━━━━━━━━━━━━━
  deploy:
    name: "🚀 Deploy to ECS"
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag & push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "### 🐳 Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: webapp-task
          container-name: webapp-app
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ━━━━━━━━━━━━━━━━ STAGE 6: SMOKE TEST ━━━━━━━━━━━━━━━━
  smoke-test:
    name: "💨 Smoke Test"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ALB URL
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names webapp-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "url=http://$ALB_DNS" >> $GITHUB_OUTPUT
          echo "ALB URL: http://$ALB_DNS"

      - name: Health endpoint check
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ steps.alb.outputs.url }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ /health returned 200"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Smoke test failed"
          exit 1

      - name: Homepage check
        run: |
          curl -sf "${{ steps.alb.outputs.url }}/" | grep -q "<html" \
            && echo "✅ Homepage serves HTML" \
            || (echo "❌ Homepage check failed" && exit 1)

      - name: Post deploy summary
        run: |
          echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.alb.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

prompts:
  - id: lecture_summary
    name: Shrnutí přednášky
    description: Zestručnění výkladu zahrnující všechna probíraná témata
    model: qwen3:14b
    parameters:
      - name: subject_code
        description: Zkratka předmětu (např. KKY/ITE)
    template: |
      Jsi asistent pedagoga. Píšeš text určený studentům předmětu {subject_code}.

      Zpracuj přiložený přepis přednášky a vytvoř zestručnění výkladu.
      Zahrň všechna témata, která se na přednášce probírala, chronologicky v pořadí, v jakém zazněla.

      Formát:
      - Nadpis: "Shrnutí hlavních bodů"
      - Číslovaný seznam
      - Každý bod začíná tučně formátovaným pojmem
      - Žádný text mimo nadpis a seznam

  - id: not_in_slides
    name: Co nenajdete v prezentaci
    description: Seznam důležitých bodů z přednášky, které nejsou obsaženy v prezentaci
    model: qwen3:14b
    parameters:
      - name: subject_code
        description: Zkratka předmětu (např. KKY/ITE)
    template: |
      Jsi asistent pedagoga. Píšeš text určený studentům předmětu {subject_code}.

      Porovnej přiložený přepis přednášky s prezentací.
      Vytvoř seznam nejdůležitějších bodů, které zazněly v přednášce, ale nejsou obsaženy v prezentaci.
      Témata uveď chronologicky v pořadí, v jakém zazněla v přednášce.

      Formát:
      - Nadpis: "Co nenajdete v prezentaci"
      - Číslovaný seznam
      - Každý bod začíná tučně formátovaným pojmem
      - Žádný text mimo nadpis a seznam

  - id: glossary
    name: Důležité pojmy
    description: Vyčerpávající abecední seznam pojmů a jejich definic z přednášky i prezentace
    model: qwen3:14b
    parameters:
      - name: subject_code
        description: Zkratka předmětu (např. KKY/ITE)
    template: |
      Jsi asistent pedagoga. Píšeš text určený studentům předmětu {subject_code}.

      Vytvoř vyčerpávající seznam důležitých pojmů a jejich definic.
      Zahrň všechny pojmy z prezentace i důležité pojmy, které zazněly v přednášce.
      Seznam může být velice dlouhý — nevynechávej žádné relevantní pojmy.
      Uspořádej seznam abecedně.

      Formát:
      - Nadpis: "Důležité pojmy"
      - Odrážkový seznam
      - Každý bod začíná tučně formátovaným pojmem
      - Žádný text mimo nadpis a seznam

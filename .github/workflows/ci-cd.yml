# ╔══════════════════════════════════════════════════════════════════╗
# ║              UTEACH.AI — CI/CD PIPELINE (FAST)                 ║
# ║  lint+test ∥ build → deploy → smoke test                      ║
# ║  security runs in parallel, does NOT block deploy              ║
# ╚══════════════════════════════════════════════════════════════════╝

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - FixPraceBezCommitu

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: webapp-app
  ECS_CLUSTER: webapp-cluster
  ECS_SERVICE: webapp-service
  PYTHON_VERSION: "3.12"

permissions:
  contents: read
  id-token: write

jobs:
  # ━━━━━━━━━━━━━━━━ STAGE 1: LINT + TEST (single job, saves runner startup) ━━━━━━━━━━━━━━━━
  lint-and-test:
    name: "🔍🧪 Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt flake8 pytest

      - name: Python syntax check
        run: python -m py_compile backend/server.py

      - name: Flake8 lint
        run: flake8 backend/server.py --max-line-length=120 --count --show-source --statistics

      - name: Validate Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  # ━━━━━━━━━━━━━━━━ STAGE 2: BUILD + DEPLOY (single job, no extra runner) ━━━━━━━━━━━━━━━━
  build-and-deploy:
    name: "🏗️🚀 Build & Deploy"
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "### 🐳 Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: webapp-task
          container-name: webapp-app
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='webapp — HTTPS via CloudFront'].Id | [0]" \
            --output text)
          if [ "$DIST_ID" != "None" ] && [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
            echo "✅ CloudFront cache invalidated ($DIST_ID)"
          else
            echo "⚠️ CloudFront distribution not found, skipping"
          fi

  # ━━━━━━━━━━━━━━━━ PARALLEL: SECURITY (does NOT block deploy) ━━━━━━━━━━━━━━━━
  security:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Check dependencies for vulnerabilities
        run: pip-audit -r backend/requirements.txt
        continue-on-error: true

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH

  # ━━━━━━━━━━━━━━━━ STAGE 3: SMOKE TEST (fast) ━━━━━━━━━━━━━━━━
  smoke-test:
    name: "💨 Smoke Test"
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Wait for deployment propagation
        run: sleep 10

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-smoketest-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CloudFront URL
        id: alb
        run: |
          CF_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='webapp — HTTPS via CloudFront'].DomainName | [0]" \
            --output text)
          if [ "$CF_DOMAIN" = "None" ] || [ -z "$CF_DOMAIN" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --names webapp-alb \
              --query 'LoadBalancers[0].DNSName' \
              --output text)
            echo "url=http://$ALB_DNS" >> $GITHUB_OUTPUT
          else
            echo "url=https://$CF_DOMAIN" >> $GITHUB_OUTPUT
          fi

      - name: Health endpoint check
        run: |
          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ steps.alb.outputs.url }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ /health returned 200"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "❌ Smoke test failed"
          exit 1

      - name: Homepage check
        run: |
          curl -sf "${{ steps.alb.outputs.url }}/" | grep -q "<html" \
            && echo "✅ Homepage serves HTML" \
            || (echo "❌ Homepage check failed" && exit 1)

# ╔══════════════════════════════════════════════════════════════════╗
# ║              UTEACH.AI — CI/CD PIPELINE                        ║
# ║  lint → test → build → security scan → deploy → smoke test    ║
# ╚══════════════════════════════════════════════════════════════════╝

name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Větev pro deploy'
        required: true
        default: 'feature/summary-adjustments'
        type: choice
        options:
          - main
          - feature/summary-adjustments

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: webapp-app
  ECS_CLUSTER: webapp-cluster
  ECS_SERVICE: webapp-service
  PYTHON_VERSION: "3.12"

permissions:
  contents: read
  id-token: write

jobs:
  # ━━━━━━━━━━━━━━━━ STAGE 1: LINT ━━━━━━━━━━━━━━━━
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt flake8

      - name: Python syntax check
        run: python -m py_compile backend/server.py

      - name: Flake8 lint
        run: flake8 backend/server.py --max-line-length=120 --count --show-source --statistics

      - name: Validate Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # ━━━━━━━━━━━━━━━━ STAGE 2: TEST ━━━━━━━━━━━━━━━━
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short
        continue-on-error: false

  # ━━━━━━━━━━━━━━━━ STAGE 3: BUILD ━━━━━━━━━━━━━━━━
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: uteach-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container & health check
        run: |
          docker run -d --name test-app -p 5001:5001 uteach-app:${{ github.sha }}
          echo "Waiting for app to start..."
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:5001/health; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "❌ Health check failed"
          docker logs test-app
          exit 1

      - name: Verify static assets served
        run: |
          curl -sf http://localhost:5001/ > /dev/null && echo "✅ index.html OK" || (echo "❌ index.html FAIL" && exit 1)
          curl -sf http://localhost:5001/styles.css > /dev/null && echo "✅ styles.css OK" || (echo "❌ styles.css FAIL" && exit 1)
          curl -sf http://localhost:5001/app.js > /dev/null && echo "✅ app.js OK" || (echo "❌ app.js FAIL" && exit 1)

      - name: Stop test container
        if: always()
        run: docker rm -f test-app 2>/dev/null || true

  # ━━━━━━━━━━━━━━━━ STAGE 4: SECURITY SCAN ━━━━━━━━━━━━━━━━
  security:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Check dependencies for vulnerabilities
        run: pip-audit -r backend/requirements.txt
        continue-on-error: true

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH

  # ━━━━━━━━━━━━━━━━ STAGE 5: DEPLOY TO AWS ━━━━━━━━━━━━━━━━
  deploy:
    name: "🚀 Deploy to ECS"
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "### 🐳 Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: webapp-task
          container-name: webapp-app
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='webapp — HTTPS via CloudFront'].Id | [0]" \
            --output text)
          if [ "$DIST_ID" != "None" ] && [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
            echo "✅ CloudFront cache invalidated ($DIST_ID)"
          else
            echo "⚠️ CloudFront distribution not found, skipping"
          fi

  # ━━━━━━━━━━━━━━━━ STAGE 6: SMOKE TEST ━━━━━━━━━━━━━━━━
  smoke-test:
    name: "💨 Smoke Test"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-smoketest-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CloudFront URL
        id: alb
        run: |
          CF_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='webapp — HTTPS via CloudFront'].DomainName | [0]" \
            --output text)
          if [ "$CF_DOMAIN" = "None" ] || [ -z "$CF_DOMAIN" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --names webapp-alb \
              --query 'LoadBalancers[0].DNSName' \
              --output text)
            echo "url=http://$ALB_DNS" >> $GITHUB_OUTPUT
            echo "URL: http://$ALB_DNS (ALB fallback)"
          else
            echo "url=https://$CF_DOMAIN" >> $GITHUB_OUTPUT
            echo "URL: https://$CF_DOMAIN"
          fi

      - name: Health endpoint check
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ steps.alb.outputs.url }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ /health returned 200"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Smoke test failed"
          exit 1

      - name: Homepage check
        run: |
          curl -sf "${{ steps.alb.outputs.url }}/" | grep -q "<html" \
            && echo "✅ Homepage serves HTML" \
            || (echo "❌ Homepage check failed" && exit 1)

      - name: Post deploy summary
        run: |
          echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.alb.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
